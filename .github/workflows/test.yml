name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python (matches pyproject.toml requires-python)
        run: uv python install 3.14

      - name: Sync dependencies (project + dev group)
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest
