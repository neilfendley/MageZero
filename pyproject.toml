[project]
name = "magezero"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "flask>=2.3",
    "h5py>=3.8",
    "torch>=2.10.0",
    "matplotlib>=3.7",
    "msgpack>=1.0.5",
    "numpy>=1.24",
    "pyroaring>=0.3.6",
    "scipy>=1.10",
    "waitress>=2.1",
]
[tool.uv.sources]
torch = [
  { index = "pytorch-cu130"},
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true
[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"
[project.scripts]
train = "magezero.train:train"
explore = "magezero.game_exploration:explore_game"