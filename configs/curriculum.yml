# curriculum.yml — hyperparameter schedule for power users

defaults:
  td_discount: 0.70
  prior_temperature: 1.5
  priors:
    binary: false
    priority: false
    target: false
    opponent: false

# gen index at which each prior head activates (null = never)
prior_schedule:
  binary: 2
  priority: 3
  target: 4
  opponent: null

# sparse per-gen overrides — unset fields inherit the previous gen's value
schedule:
  - gen: 0
    td_discount: 0.95
  - gen: 1
    td_discount: 0.92
  - gen: 2
    td_discount: 0.85
  - gen: 3
    td_discount: 0.70